<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Cetak Nota</title>
    <style>
        body { font-family: 'Courier New', Courier, monospace; width: 280px; font-size: 12px; margin: 0; padding: 10px; }
        .tengah { text-align: center; }
        .garis { border-top: 1px dashed #000; margin: 5px 0; }
        table { width: 100%; border-collapse: collapse; }
        .Kanan { text-align: right; }
    </style>
</head>
<body>
    <div class="tengah">
        <strong id="nama_toko">RENY HIJAB PADANG</strong><br>
        <span id="alamat_toko">Alamat...</span><br>
        <span id="telp_toko">Telp...</span>
    </div>
    <div class="garis"></div>
    No Transaksi : <span id="id_transaksi"></span><br>
    Tanggal      : <span id="tanggal"></span>
    <div class="garis"></div>
    <table>
        <thead>
            <tr>
                <th align="left">Produk</th>
                <th align="center">Qty</th>
                <th class="Kanan">Harga</th>
            </tr>
        </thead>
        <tbody id="list_produk">
            <!-- Data produk dari AppSheet akan muncul otomatis di sini -->
        </tbody>
    </table>
    <div class="garis"></div>
    <table>
        <tr><td>Total</td><td>:</td><td class="Kanan" id="total">0</td></tr>
        <tr><td>Tunai</td><td>:</td><td class="Kanan" id="tunai">0</td></tr>
        <tr><td>Kembalian</td><td>:</td><td class="Kanan" id="kembali">0</td></tr>
    </table>
    <div class="garis"></div>
    <div class="tengah">Terima Kasih.</div>

    <script>
        // Mengambil data dari link URL AppSheet
        const params = new URLSearchParams(window.location.search);
        
        document.getElementById('nama_toko').innerText = params.get('nama_toko') || 'RENY HIJAB PADANG';
        document.getElementById('alamat_toko').innerText = params.get('alamat_toko') || 'Alamat...';
        document.getElementById('telp_toko').innerText = params.get('telp_toko') || 'Telp...';
        document.getElementById('id_transaksi').innerText = params.get('id_transaksi') || '-';
        document.getElementById('tanggal').innerText = params.get('tanggal') || '-';
        document.getElementById('total').innerText = params.get('total') || '0';
        document.getElementById('tunai').innerText = params.get('tunai') || '0';
        document.getElementById('kembali').innerText = params.get('kembali') || '0';

        // Memecah data produk yang banyak (List) menjadi baris tabel
        const namaProduk = (params.get('nama_produk') || '').split(' , ');
        const qty = (params.get('qty') || '').split(' , ');
        const harga = (params.get('harga_produk') || '').split(' , ');

        const tbody = document.getElementById('list_produk');
        for (let i = 0; i < namaProduk.length; i++) {
            if (namaProduk[i]) {
                let row = `<tr>
                    <td>${namaProduk[i]}</td>
                    <td align="center">${qty[i] || 0}</td>
                    <td class="Kanan">${harga[i] || 0}</td>
                </tr>`;
                tbody.innerHTML += row;
            }
        }

        // Otomatis membuka perintah print saat halaman terbuka
        window.print();
    </script>
</body>
</html>
